<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepção - HSM | SESA</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;600;700;900&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans', sans-serif;
            background-color: #f8fafc;
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
        }

        .ceara-green {
            background-color: #008140;
        }

        .ceara-green-text {
            color: #008140;
        }

        .ceara-gold {
            background-color: #ffcc00;
        }

        .ceara-gold-border {
            border-color: #ffcc00;
        }

        input:focus {
            outline: none;
            border-color: #008140;
            box-shadow: 0 0 0 3px rgba(0, 129, 64, 0.1);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="ceara-green text-white p-4 shadow-lg border-b-4 ceara-gold-border">
        <div class="container mx-auto flex justify-between items-center">

            <div class="flex items-center space-x-4">

                <a href="index.html" class="bg-white p-1.5 rounded shadow-sm hover:opacity-90 transition-opacity">

                    <svg width="100" height="30" viewBox="0 0 120 40" fill="none">
                        <text x="5" y="25" fill="#008140" font-weight="900" font-size="18">CEARÁ</text>
                        <text x="5" y="38" fill="#008140" font-weight="bold" font-size="9">GOVERNO DO ESTADO</text>
                        <rect x="0" y="0" width="3" height="40" fill="#ffcc00" />
                    </svg>

                </a>

                <div class="h-8 w-px bg-white/30"></div>

                <div>
                    <h1 class="font-bold text-base uppercase tracking-tight leading-none">
                        Módulo Recepção
                    </h1>

                    <p class="text-[10px] opacity-90 uppercase font-semibold mt-1">
                        Hospital de Saúde Mental Prof. Frota Pinto
                    </p>
                </div>

            </div>

            <a href="index.html"
                class="flex items-center space-x-2 bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg transition-all text-sm font-bold">

                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>

                <span>VOLTAR AO MENU</span>
            </a>

        </div>
    </header>


    <main class="container mx-auto py-10 px-6 flex-grow">

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">


            <!-- COLUNA CADASTRO -->
            <div class="lg:col-span-2">

                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">

                    <div class="ceara-green p-5 flex items-center space-x-3">

                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />

                        </svg>

                        <h2 class="text-white font-black uppercase tracking-wider text-sm">
                            Registrar Novo Paciente
                        </h2>

                    </div>

                    <form class="p-10 space-y-8">

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

                            <div class="md:col-span-2">

                                <label class="block text-xs font-black text-gray-400 uppercase mb-3 tracking-[0.15em]">
                                    Nome Completo
                                </label>

                                <input type="text" placeholder="Digite o nome do paciente..."
                                    class="w-full bg-gray-50 border border-gray-200 rounded-xl px-5 py-4 text-gray-700 font-medium transition-all focus:bg-white">

                            </div>


                            <div>

                                <label class="block text-xs font-black text-gray-400 uppercase mb-3 tracking-[0.15em]">
                                    Data de Nascimento
                                </label>

                                <input type="date"
                                    class="w-full bg-gray-50 border border-gray-200 rounded-xl px-5 py-4 text-gray-700 font-medium transition-all focus:bg-white">

                            </div>


                            <div>

                                <label class="block text-xs font-black text-gray-400 uppercase mb-3 tracking-[0.15em]">
                                    CPF
                                </label>

                                <input type="text" placeholder="000.000.000-00"
                                    class="w-full bg-gray-50 border border-gray-200 rounded-xl px-5 py-4 text-gray-700 font-medium transition-all focus:bg-white">

                            </div>

                        </div>


                        <div class="pt-6">

                            <button type="submit"
                                class="w-full md:w-auto ceara-green hover:bg-green-700 text-white font-black py-4 px-12 rounded-xl shadow-lg shadow-green-100 transition-all uppercase tracking-widest text-sm flex items-center justify-center space-x-3">

                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M5 13l4 4L19 7" />

                                </svg>

                                <span>Finalizar Registro</span>

                            </button>

                        </div>

                    </form>

                </div>

            </div>


            <!-- COLUNA RECENTES -->
            <div class="lg:col-span-1">

                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 h-full flex flex-col">

                    <div class="p-5 border-b border-gray-50 flex items-center justify-between">

                        <h2 class="text-gray-800 font-black uppercase tracking-wider text-xs flex items-center">

                            <span class="w-2 h-2 bg-ceara-gold rounded-full mr-2"></span>

                            Recém Registrados

                        </h2>

                        <span class="text-[10px] font-bold text-gray-400 uppercase">
                            Hoje
                        </span>

                    </div>


                    <div class="flex-grow overflow-y-auto custom-scrollbar">


                        <div
                            class="px-6 py-4 flex items-center justify-between hover:bg-gray-50 transition-colors border-b border-gray-50">

                            <div>

                                <p class="text-sm font-bold text-gray-700 leading-tight">
                                    Francisco de Assis Lima
                                </p>

                                <p class="text-[10px] text-gray-400 mt-1 font-medium">
                                    123.***.***-90
                                </p>

                            </div>

                            <span class="text-[10px] font-bold text-gray-300">
                                14:25
                            </span>

                        </div>


                        <div
                            class="px-6 py-4 flex items-center justify-between hover:bg-gray-50 transition-colors border-b border-gray-50">

                            <div>

                                <p class="text-sm font-bold text-gray-700 leading-tight">
                                    Maria do Socorro Pereira
                                </p>

                                <p class="text-[10px] text-gray-400 mt-1 font-medium">
                                    456.***.***-12
                                </p>

                            </div>

                            <span class="text-[10px] font-bold text-gray-300">
                                14:10
                            </span>

                        </div>


                        <div
                            class="px-6 py-4 flex items-center justify-between hover:bg-gray-50 transition-colors border-b border-gray-50">

                            <div>

                                <p class="text-sm font-bold text-gray-700 leading-tight">
                                    Antônio Carlos da Silva
                                </p>

                                <p class="text-[10px] text-gray-400 mt-1 font-medium">
                                    789.***.***-34
                                </p>

                            </div>

                            <span class="text-[10px] font-bold text-gray-300">
                                13:45
                            </span>

                        </div>

                    </div>


                    <div class="p-4">

                        <button
                            class="w-full py-3 bg-gray-50 rounded-xl text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] hover:bg-gray-100 hover:text-gray-600 transition-all">

                            Visualizar Todos

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </main>

</body>

</html>
