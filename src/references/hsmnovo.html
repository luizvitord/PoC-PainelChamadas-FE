<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão Hospitalar - Ceará</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'Noto Sans', sans-serif;
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
        }
        @keyframes marquee { 
            0% { transform: translateX(100%); } 
            100% { transform: translateX(-100%); } 
        }
        .animate-marquee {
            animation: marquee 30s linear infinite;
        }
    </style>
</head>
<body class="bg-[#f8fafc]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- COMPONENTE DE LISTA DE ATENDIMENTOS (REUTILIZÁVEL) ---
        // Removido horário dos atendimentos recentes
        const AtendimentosRecentes = ({ atendimentos, onLimpar }) => (
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div className="p-5 border-b border-gray-100 flex items-center justify-between bg-gray-50">
              <div className="flex items-center space-x-3">
                <div className="w-2 h-6 bg-[#ffcc00] rounded-full"></div>
                <h2 className="text-gray-800 font-black uppercase tracking-wider text-sm">Atendimentos Recentes</h2>
              </div>
              <button 
                onClick={onLimpar}
                className="text-xs font-black text-red-500 hover:text-red-700 uppercase tracking-widest border border-red-100 px-2 py-1 rounded-md hover:bg-red-50 transition-all"
              >
                Limpar
              </button>
            </div>
            <div className="divide-y divide-gray-50 max-h-[400px] overflow-y-auto">
              {atendimentos.length > 0 ? (
                atendimentos.map((paciente) => (
                  <div key={paciente.id} className="px-6 py-4 flex items-center justify-between hover:bg-gray-50 transition-colors">
                    <div>
                      <p className="text-base font-bold text-gray-700 leading-tight uppercase">{paciente.nome}</p>
                      <p className="text-sm text-gray-500 mt-1 font-medium italic">{paciente.documento}</p>
                    </div>
                    {/* Horário removido conforme solicitado */}
                  </div>
                ))
              ) : (
                <div className="px-6 py-12 text-center">
                  <p className="text-sm font-black text-gray-300 uppercase tracking-widest">Nenhum atendimento na lista</p>
                </div>
              )}
            </div>
          </div>
        );

        // --- COMPONENTE HOME (Painel de Controle) ---
        const HomePage = ({ onNavigate }) => (
          <main className="container mx-auto py-12 px-6 flex-grow flex flex-col justify-center">
            <div className="mb-12 text-center">
              <h2 className="text-3xl font-black text-gray-800 uppercase tracking-tight">Painel de Controle</h2>
              <div className="h-1.5 w-24 bg-[#ffcc00] mx-auto mt-3 rounded-full"></div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl mx-auto w-full">

              {/* RECEPÇÃO — cor verde escuro, ícone balcão/recepcionista */}
              <button onClick={() => onNavigate('recepcao')} className="group transition-all duration-300 hover:-translate-y-2 bg-white rounded-2xl shadow-sm border-b-8 border-[#005a2b] p-8 flex flex-col items-center text-center outline-none">
                <div className="w-20 h-20 bg-green-50 rounded-2xl flex items-center justify-center mb-6 border border-green-200 transition-transform group-hover:scale-110">
                  {/* Ícone: pessoa no balcão / bancada de trabalho */}
                  <svg className="w-11 h-11 text-[#005a2b]" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="1.8">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M3 20h18"/>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M3 14h18v6H3z" opacity="0.3" fill="currentColor" stroke="none"/>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 4a2 2 0 1 1 0 4 2 2 0 0 1 0-4z"/>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M9 14v-3a3 3 0 0 1 6 0v3"/>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M5 14h14"/>

idth:'52px', height:'52px', objectFit:'contain'}}/>

                <h3 className="text-lg font-black text-gray-800 uppercase mb-2">Acolhimento</h3>
                <p className="text-xs text-gray-500 font-medium leading-relaxed">Classificação de risco e priorização de atendimento.</p>
              </button>

              {/* CONSULTÓRIO — cor roxo/índigo, ícone porta se abrindo */}

                <form onSubmit={handleSubmit} className="grid grid-cols-1 md:grid-cols-2 gap-6 items-end">
                  <div className="space-y-2">
                    <label className="block text-sm font-black uppercase text-gray-700 tracking-widest">Identificação da Sala</label>
                    <input type="text" value={formData.sala} onChange={(e) => setFormData({...formData, sala: e.target.value})} placeholder="Ex: Sala 05" className="w-full px-4 py-4 bg-gray-50 border border-gray-300 rounded-xl text-gray-800 text-base font-medium outline-none" required />
                  </div>
                  <div className="space-y-2">
                    <label className="block text-sm font-black uppercase text-gray-700 tracking-widest">Profissional Responsável</label>
                    <input type="text" value={formData.responsavel} onChange={(e) => setFormData({...formData, responsavel: e.target.value})} placeholder="Nome do médico" className="w-full px-4 py-4 bg-gray-50 border border-gray-300 rounded-xl text-gray-800 text-base font-medium outline-none" required />
                  </div>
                  <button type="submit" className="md:col-span-2 w-full bg-[#008140] hover:bg-green-700 text-white font-black uppercase tracking-widest py-5 rounded-xl shadow-lg transition-all text-base">Cadastrar Consultório</button>
                </form>
              </div>
              <div className="bg-white rounded-2xl shadow-md border border-gray-100 overflow-hidden">
                <table className="w-full text-left">
                  <thead className="bg-gray-50 border-b border-gray-100">
                    <tr>
                      <th className="px-6 py-5 text-sm font-black uppercase text-gray-600 tracking-widest">Sala</th>
                      <th className="px-6 py-5 text-sm font-black uppercase text-gray-600 tracking-widest">Responsável</th>
                    </tr>
                  </thead>
                  <tbody>
                    {consultorios.map((c) => (
                      <tr key={c.id} className="border-b border-gray-50">
                        <td className="px-6 py-5 font-bold text-gray-800 uppercase text-base">{c.sala}</td>
                        <td className="px-6 py-5 text-gray-700 text-base">{c.responsavel}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </main>
          );
        };

        // --- COMPONENTE PAINEL DE CHAMADA ---
        const PainelPage = ({ onNavigate }) => (
          <main className="flex-grow flex flex-col md:flex-row gap-0 h-full relative">
            {/* Botão discreto de voltar — canto superior esquerdo */}
            <button
              onClick={() => onNavigate('home')}
              className="absolute top-4 left-4 z-50 flex items-center space-x-2 bg-white/10 hover:bg-white/25 text-white px-4 py-2 rounded-lg transition-all text-sm font-black uppercase border border-white/20"
            >
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
              <span>Voltar</span>
            </button>
            {/* Coluna principal - Chamada Atual */}
            <div className="flex-grow flex flex-col gap-0 bg-[#0f1923]">
              <div className="flex-grow flex flex-col items-center justify-center p-12 text-center bg-[#0f1923]">
                <p className="text-gray-400 font-bold uppercase tracking-widest text-lg mb-6">Chamada Atual</p>
                <div className="h-1 w-32 bg-[#ffcc00] rounded-full mb-10"></div>
                {/* Nome maior com quebra de linha permitida */}
                <h3 className="text-6xl md:text-7xl lg:text-8xl font-black text-white uppercase mb-8 tracking-tighter leading-tight break-words max-w-4xl">ANTONIO SILVA</h3>
                <div className="h-1 w-32 bg-[#ffcc00] rounded-full mb-10"></div>
                {/* Sala em destaque no lugar do horário */}
                <div className="bg-[#008140] px-20 py-8 rounded-3xl shadow-xl">
                  <p className="text-4xl md:text-5xl font-black text-white uppercase tracking-widest">
                    CONSULTÓRIO 03
                  </p>
                </div>
              </div>
            </div>

            {/* Coluna lateral - Últimas Chamadas */}
            <div className="w-full md:w-80 bg-[#1a2535] flex flex-col">
              <div className="p-7 border-b border-white/10">
                <h3 className="text-white font-black uppercase tracking-widest text-base text-center">Últimas Chamadas</h3>
              </div>
              <div className="flex-grow p-6 space-y-4 overflow-y-auto">
                {/* Todos os cards com mesma opacidade padrão */}
                <div className="bg-white/10 p-5 rounded-2xl flex flex-col gap-1 border border-white/10">
                  <p className="text-white font-black text-lg uppercase leading-tight break-words">MARIA OLIVEIRA</p>
                  {/* Sala em destaque, sem horário */}
                  <p className="text-[#ffcc00] text-base font-black uppercase mt-1">SALA 02</p>
                </div>
                <div className="bg-white/10 p-5 rounded-2xl flex flex-col gap-1 border border-white/10">
                  <p className="text-white font-black text-lg uppercase leading-tight break-words">JOÃO RICARDO</p>
                  <p className="text-[#ffcc00] text-base font-black uppercase mt-1">SALA 01</p>
                </div>
                <div className="bg-white/10 p-5 rounded-2xl flex flex-col gap-1 border border-white/10">
                  <p className="text-white font-black text-lg uppercase leading-tight break-words">FRANCISCA LIMA</p>
                  <p className="text-[#ffcc00] text-base font-black uppercase mt-1">SALA 03</p>
                </div>
              </div>
            </div>
          </main>
        );

        // --- COMPONENTE PRINCIPAL (APP) ---
        function App() {
          const [currentPage, setCurrentPage] = useState('home');

          const getHeaderInfo = () => {
            switch(currentPage) {
              case 'recepcao': return { title: 'Recepção', sub: 'Entrada de Pacientes' };
              case 'acolhimento': return { title: 'Acolhimento', sub: 'Classificação de Risco' };
              case 'consultorio': return { title: 'Consultório', sub: 'Atendimento Médico Especializado' };
              case 'adicionarconsultorio': return { title: 'Gestão Hospitalar', sub: 'Configuração de Unidades' };
              case 'painel': return { title: 'Painel de Chamada', sub: 'Gestão de Chamadas' };
              default: return { title: 'Sistema de Gestão Hospitalar', sub: 'Hospital de Saúde Mental Prof. Frota Pinto' };
            }
          };

          const header = getHeaderInfo();

          // Painel não exibe header (vai para TV)
          if (currentPage === 'painel') {
            return (
              <div className="min-h-screen flex flex-col">
                <PainelPage onNavigate={setCurrentPage} />
                <footer className="bg-[#0f1923] border-t border-white/10 text-white p-3 overflow-hidden whitespace-nowrap">
                  <div className="inline-block animate-marquee uppercase font-bold text-sm tracking-widest text-gray-400">
                    SESA - Secretaria da Saúde do Estado do Ceará | Hospital de Saúde Mental Prof. Frota Pinto | Atendimento Humanizado e Eficiente | Ceará em Desenvolvimento
                  </div>
                </footer>
              </div>
            );
          }

          return (
            <div className="min-h-screen flex flex-col">
              <header className="bg-[#008140] text-white p-4 shadow-lg border-b-4 border-[#ffcc00]">
                <div className="container mx-auto flex justify-between items-center">
                  <div className="flex items-center space-x-4">
                    {/* Logo Ceará maior */}
                    <button onClick={() => setCurrentPage('home')} className="bg-white p-2 rounded shadow-sm hover:opacity-90 transition-all">
                      <svg width="140" height="42" viewBox="0 0 140 42" fill="none">
                        <text x="8" y="27" fill="#008140" fontWeight="900" fontSize="22">CEARÁ</text>
                        <text x="8" y="40" fill="#008140" fontWeight="bold" fontSize="10">GOVERNO DO ESTADO</text>
                        <rect x="0" y="0" width="4" height="42" fill="#ffcc00"/>
                      </svg>
                    </button>
                    <div className="h-10 w-px bg-white/30"></div>
                    <div>
                      <h1 className="font-bold text-base md:text-lg uppercase tracking-tight leading-none">{header.title}</h1>
                      <p className="text-xs md:text-sm opacity-90 uppercase font-semibold mt-1">{header.sub}</p>
                    </div>
                  </div>
                  {/* Botão Voltar visível e à esquerda do título, no lado esquerdo */}
                  {currentPage !== 'home' && (
                    <button onClick={() => setCurrentPage('home')} className="flex items-center space-x-2 bg-white text-[#008140] hover:bg-gray-100 px-5 py-2.5 rounded-lg transition-all text-sm font-black uppercase shadow">
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                      <span>Voltar</span>
                    </button>
                  )}
                </div>
              </header>

              {currentPage === 'home' && <HomePage onNavigate={setCurrentPage} />}
              {currentPage === 'recepcao' && <RecepcaoPage onNavigate={setCurrentPage} />}
              {currentPage === 'acolhimento' && <AcolhimentoPage />}
              {currentPage === 'consultorio' && <ConsultorioPage />}
              {currentPage === 'adicionarconsultorio' && <AdicionarConsultorioPage />}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
